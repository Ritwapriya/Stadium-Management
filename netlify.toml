[build]
  command = "pip install -r backend/requirements.txt"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/api/*"
  to = "http://localhost:8000/:splat"
  status = 200

[dev]
  command = "uvicorn backend.main:app --host 0.0.0.0 --port 8000"
  targetPort = 8000
